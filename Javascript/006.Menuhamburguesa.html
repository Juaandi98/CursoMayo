<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu hamburguesa</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background-color: rgb(47, 122, 124);
            color: white;
            line-height: 1.4;
        }
        header{
            background-color: rgb(158, 19, 19);
            color: white;
            position: relative;
        }
        nav{
            max-width: 1000px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }
        .logo{
            font-size: 42px;
            font-weight: bold;
        }

        /* Menu */

        #menu{
            list-style: none;
            display: flex;
            gap: 25px;
        }
        #menu a{
            text-decoration: none;
            color: white;
        }
        #menu a:hover{
            color: #60a5fa;
        }

        /* botón hamburguesa */

        #hamburguesa{
            display: none;
            font-size: 28px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* Menu en moviles */

        @media (max-width:700px){
            #hamburguesa{
                display: block;
            }

            #menu{
                display: none;
                position: absolute;
                top: 100%;
                left: 0;

                width: 100%;
                background-color: rgb(0, 0, 0);
                flex-direction: column;

                box-shadow: 0 5px 10px rgba(1, 33, 70, 0.445);
            }

            #menu li{
                margin: 0;
                border-top: 1px solid black;
            }

            #manu a{
                display: block;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">Mi logo</div>
            <button id="hamburguesa">&#9776;</button>
            <ul id="menu">
                <li><a href="">Archivo</a></li>
                <li><a href="">Editor</a></li>
                <li><a href="">Selection</a></li>
                <li><a href="">Ver</a></li>
                <li><a href="">Ayuda</a></li>
            </ul>
        </nav>
    </header>

    <script>
        const boton = document.getElementById("hamburguesa");
        const menu = document.getElementById("menu");

        boton.addEventListener ("click",cambia_menu);
        window.addEventListener("resize",restaura_menu);

        function cambia_menu(){
            if(menu.style.display == "flex"){
                menu.style.display = "none";
            }
            else{
                menu.style.display = "flex";
                menu.style.flexDirection = "colum";
            }
        }

        function restaura_menu(){
            if(window.innerWidth > 700){
                menu.style.display = "flex";
                menu.style.flexdirection = "row";
            }
            else{
                menu.style.display = "none";
            }
        }
        restaura_menu();
        
    </script>
    
</body>
</html>
