<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introducción a Flex</title>
    <style>

        .contenedor{
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            justify-content: center;

            align-items: center;


            border: 2px solid red;
            padding: 1rem;
            height: 100vh;

            gap: 1rem;

            flex-wrap: wrap;
            flex-wrap: nowrap;
        }

        .contenedor div{
            height: 200px;
            width: 200px;
            border: 1px solid blue;
            font-size: 3rem;
        }

        .numero{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .uno{
            flex-grow: 1;
            flex-basis: 800px;
        }

        .dos{
            flex-shrink: 2;
        }

    </style>
</head>
<body>

    <section class="contenedor">

        <div class="numero uno">1</div>

        <div class="numero dos">2</div>

        <div class="numero">3</div>

    </section>
    
</body>
</html>
