<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chulapa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400..700;1,400..700&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Sora:wght@100..800&display=swap"
        rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html {
            font-family: 'Sora', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
        }

        header {
            height: 100vh;
            width: 100vw;
            background-image: url(Imagenesdeejercicios/chulapa.avif);
            background-position: center;
            background-size: cover;
            overflow: hidden;
        }

        h1{
            font-size: 5.2rem;
            color: white;
            text-shadow: 1px 3px 2px black;
            text-transform: uppercase;
        }

        .fondogris {
            height: 100%;
            background-color: rgba(0, 0, 0, 0.473);
            padding-top: 33vh;
        }

        .separador {
            width: 12%;
            margin: 10px auto;
            border: 0;
            border-top: 2px solid white;
            border-bottom: 2px solid black;            
        }

        .contenedor {
            width: 70vw;
            margin: 0 auto;
            text-align: center;
        }

        .sombra{
            text-shadow: 1px 2px 2px black;
        }

        .subtitulo{
            color: white;
            font-size: 2.4rem;
        }

        .pastilla{
            margin: 2rem;
            width: fit-content;
            color: white;
            border: 1px solid white;
            padding: 10px;
            border-radius: 10px;
            margin: 0 auto;
            margin-top: 5rem;
        }

        .pastilla a{
            font-size: 1.2rem;
            color: white;
            text-decoration: none;
        }

        .pastilla :hover{
            color: rgb(63, 63, 128);
        }

        .icono-github :hover{
            transform: scale(1.5);
        }

        main{
            background-color: rgb(0, 0, 66);
            padding-bottom: 60rem;
        }

        .separacion{
            padding-top: 30px;
        }

        .cajaversion{
            margin: 2rem;
            width: fit-content;
            color: rgb(146, 146, 146);
            border: 1px solid rgb(41, 41, 255);
            margin: 0 auto;
            background-color: rgb(65, 65, 255);
            font-weight: bold;
            font-size: 0.9rem;  
            margin-bottom: 3rem;       
        }

        .cajaversion a{
            text-decoration: none;
        }

        .caja1{
            margin: 2rem;
            width: fit-content;
            color: rgb(146, 146, 146);
            border: 1px solid rgb(41, 41, 255);
            padding: 7px;
            margin: 0 auto;
            background-color: rgb(41, 41, 255);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .version{
            margin: 2rem;
            width: fit-content;
            color: rgb(146, 146, 146);
            border: 1px solid rgb(41, 41, 255);
            padding: 7.5px;
            margin: 0 auto;
            background-color: rgb(0, 0, 100);
            font-weight: bold;
            font-size: 0.9rem;
        }

        a .version{
            text-decoration: none;
            color: rgb(84, 84, 255);
        }

        .caja2{
            width: fit-content;
            border: 1px solid rgb(41, 41, 255);
            padding: 10px;
            border-radius: 5px;
            margin: 0 auto;
            background-color: rgb(41, 41, 255);
            font-size: 21px;            
        }

        .caja2 a{
            text-decoration: none;
            color: rgb(0, 0, 100);
        }

        .cajonazo{
            width: fit-content;
            border: 1px solid rgb(41, 41, 255);
            padding: 10px;
            border-radius: 5px;
            margin: 0 auto;
            background-color: rgb(41, 41, 255);
            font-size: 21px;
            text-align: center;
            margin-top: 2.2rem;
            
        }


        

    </style>

</head>

<body>

    <header>

        <div class="fondogris">

            <div class="contenedor">

                <h1>Chulapa</h1>

                <hr class="separador">

                <p class="sombra subtitulo">A full flexible Jekyll theme for Github Pages</p>

                <div class="pastilla">

                <a href="#"><i class="fa-brands fa-github"></i>Follow</a></div>

            </div>

        </div>

    </header>

    <main>

        <div class="separacion">
            
            <p class="cajaversion"><span class="caja1"> Lastest release </span> 
                
                <a href="#"> <span class="version">v2.0.1</span></a></p>
            
        </div>

        <div class="caja2"><a href="#">Read the docs</a></div>

        <section>

            <div class="cajonazo">

                <span>icono</span>

                <h3>Easy to install</h3>

                <p>Create a fully responsive website hosted on Github in minutes - for free! Remote Github theme or gem-based method, you choose</p>

            </div>






        </section>

        <section></section>

        <section></section>

        <section></section>

        <section></section>







    </main>

</body>

</html>
