<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen en un div</title>
    <style>

        *{
            margin: 0;
            padding: 0;
        }

        .dimensiones{
            height: 100vh;
            width: 100vw;
        }

        .imagen{
            background-image: url("Imagenesdeejercicios/Trianacf.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            overflow: hidden;            
        }

        h1{
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 5rem;
            color: black;
            margin-top: 40vh;
            text-align: center;
            background-color: rgba(240, 248, 255, 0.507);
        }

    </style>
</head>
<body>

    <div class="dimensiones imagen"><h1>Número 1</h1></div>
    <div class="dimensiones imagen"><h1>Número 2</h1></div>
    <div class="dimensiones imagen"><h1>Número 3</h1></div>
    
</body>
</html>
