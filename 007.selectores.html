<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectores</title>
    <style>

        h1{
            font-family: 'Courier New', Courier, monospace;
            font-size: 42px;
        }

        .rojo{
            color: red;
        }

        .negrita{
            font-weight: bold;
        }

        .centrado{
            text-align: center;
        }
        
        #primero{
            text-decoration: underline;
        }

        a{
          font-family: Arial, Helvetica, sans-serif;
          text-decoration: overline;
          font-size: 22px;  
        }

        article p{
            text-decoration: none;
            background-color: green;
            color: yellow;
        }
        
    </style>
</head>
<body>
    <h1 class="rojo">Hola Mundo</h1>

    <h1>Segundo Títular</h1>

    <header>
        <p class="negrita rojo centrado">dsadhbjghygjhed</p>                               
    </header>

    <h2 id="primero">Este es un h2</h2>

    <a href="#">este es un enlace</a>

    <article>
        <p>
            Texto basura <a href="#">Enlace lejano</a>
        </p>
    </article>
    
</body>
</html>
