<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introducción a Grid</title>
    <style>

        .contenedor{
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;    
            gap: 10px;        
        }

        .contenedor div{
            border: 1px solid blue;
            height: 200px;
        }

        .areas{
            display: grid;
            grid-template-areas:    "cabecera cabecera cabecera"
                                    "lateral cuerpo cuerpo"
                                    "pie pie pie";
        }

        .inicio{
            grid-area: cabecera;
            height: 100px;
            background-color: aqua;
        }

        .col1{
            grid-area: lateral;
            height: 500px;
            background-color: rgb(255, 238, 0);
        }

        .col2{
            grid-area: cuerpo;
            height: 500px;
            background-color: rgb(255, 0, 0);
        }

        .final{
            grid-area: pie;
            height: 100px;
            background-color: rgb(89, 0, 255);
        }

    </style>
</head>
<body>

    <div class="areas">

        <div class="inicio">Cabecera</div>

        <div class="col1">Lateral</div>

        <div class="col2">Cuerpo</div>

        <div class="final">Pie</div>

    </div>

    <div class="contenedor">

        <div>A</div>

        <div>B</div>

        <div>C</div>

        <div>D</div>

        <div>E</div>

        <div>F</div>

        <div>G</div>

        <div>H</div>

        <div>I</div>

        <div>J</div>

        <div>K</div>

        <div>L</div>

        <div>M</div>

        <div>N</div>

        <div>O</div>

        <div>P</div>

        <div>Q</div>

        <div>R</div>

        <div>S</div>

        <div>T</div>

        <div>U</div>

        <div>V</div>

        <div>W</div>
        
    </div>    
    
</body>
</html>
